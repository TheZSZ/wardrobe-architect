# Fail2ban jail for wardrobe-architect
#
# Install:
#   sudo cp fail2ban/filter.d/wardrobe-badbots.conf /etc/fail2ban/filter.d/
#   sudo cp fail2ban/jail.d/wardrobe.conf /etc/fail2ban/jail.d/
#   sudo systemctl reload fail2ban
#
# Check status:
#   sudo fail2ban-client status wardrobe-badbots

[wardrobe-badbots]
enabled = true
port = http,https
filter = wardrobe-badbots
logpath = /path/to/wardrobe-architect/logs/nginx/access.log
maxretry = 3
findtime = 600
bantime = 86400
action = iptables-multiport[name=wardrobe, port="http,https", protocol=tcp]
