# Fail2ban filter for wardrobe-architect
# Detects common exploit attempts and bot scanners
#
# Install:
#   sudo cp fail2ban/filter.d/wardrobe-badbots.conf /etc/fail2ban/filter.d/
#   sudo cp fail2ban/jail.d/wardrobe.conf /etc/fail2ban/jail.d/
#   sudo systemctl reload fail2ban

[Definition]

# Match requests for PHP, ASP, WordPress, phpMyAdmin, etc.
failregex = ^<HOST> -.*"(GET|POST|HEAD).*(\.php|\.asp|\.aspx|\.env|\.git|wp-admin|wp-login|xmlrpc|phpmyadmin|\.cgi).*" (400|403|404|444)
            ^<HOST> -.*"(GET|POST).*(invokefunction|eval\(|base64_decode|shell_exec).*"
            ^<HOST> -.*"(GET|POST).*/etc/passwd.*"
            ^<HOST> -.*"(GET|POST).*\.\./\.\./.*"

ignoreregex =

