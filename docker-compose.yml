# Cleanup commands:
#   docker compose down              - Stop and remove containers
#   docker compose down -v           - Also remove volumes
#   docker images --filter "reference=wardrobe-*" -q | xargs docker rmi  - Remove images

name: wardrobe

networks:
  wardrobe-net:
    name: wardrobe-net

services:
  nginx:
    image: nginx:alpine
    platform: linux/amd64
    container_name: wardrobe-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - wardrobe-cache:/var/cache/nginx
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - wardrobe-api
    networks:
      - wardrobe-net
    restart: unless-stopped
    command: ["/bin/sh", "-c", "mkdir -p /var/cache/nginx/images && nginx -g 'daemon off;'"]

  wardrobe-api:
    build:
      context: .
      platforms:
        - linux/amd64
    image: wardrobe-api:latest
    platform: linux/amd64
    container_name: wardrobe-api
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"  # Localhost only, force traffic through nginx
    volumes:
      - ./images:/app/images
      - ./htmlcov:/app/htmlcov:ro
      - ./logs:/var/log
      - ./logs/nginx:/var/log/nginx:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For docker logs access
    environment:
      - API_KEY=${API_KEY:-dummy}
      - GOOGLE_SHEETS_CREDENTIALS_JSON=${GOOGLE_SHEETS_CREDENTIALS_JSON}
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - DUMMY_MODE=${DUMMY_MODE:-false}
      - IMAGES_DIR=/app/images
      - DATABASE_URL=postgresql://wardrobe:${DB_PASSWORD:-wardrobe}@db:5432/wardrobe
      - SYNC_ON_STARTUP=${SYNC_ON_STARTUP:-false}
      # Multi-user auth settings
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DEV_MODE=${DEV_MODE:-false}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - APPLE_OAUTH_CLIENT_ID=${APPLE_OAUTH_CLIENT_ID:-}
      # ClamAV virus scanning
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - CLAMAV_ENABLED=${CLAMAV_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - wardrobe-net
    restart: unless-stopped

  clamav:
    image: clamav/clamav:stable
    platform: linux/amd64
    container_name: wardrobe-clamav
    volumes:
      - clamav-db:/var/lib/clamav
    networks:
      - wardrobe-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # ClamAV needs time to load virus definitions

  db:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: wardrobe-db
    environment:
      POSTGRES_USER: wardrobe
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wardrobe}
      POSTGRES_DB: wardrobe
    volumes:
      - wardrobe-db:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "${DB_PORT:-5433}:5432"  # Use 5433 by default to avoid conflicts
    networks:
      - wardrobe-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wardrobe -d wardrobe"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-db:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: wardrobe-test-db
    environment:
      POSTGRES_USER: wardrobe
      POSTGRES_PASSWORD: wardrobe
      POSTGRES_DB: wardrobe_test
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - wardrobe-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wardrobe -d wardrobe_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - test

  test:
    build:
      context: .
      platforms:
        - linux/amd64
    image: wardrobe-api:latest
    platform: linux/amd64
    command: pytest
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini
      - ./.coveragerc:/app/.coveragerc
      - ./htmlcov:/app/htmlcov
    environment:
      - API_KEY=test-key
      - GOOGLE_SHEET_ID=test-sheet-id
      # DATABASE_URL is set by individual test fixtures:
      # - Unit tests use invalid URL to prevent DB connections
      # - Integration tests use test-db URL for real DB testing
    depends_on:
      test-db:
        condition: service_healthy
    networks:
      - wardrobe-net
    profiles:
      - test

  lint:
    build:
      context: .
      platforms:
        - linux/amd64
    image: wardrobe-api:latest
    platform: linux/amd64
    command: flake8 app tests
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./.flake8:/app/.flake8
    profiles:
      - lint

volumes:
  wardrobe-db:
    name: wardrobe-db
  wardrobe-cache:
    name: wardrobe-cache
  clamav-db:
    name: wardrobe-clamav-db
