<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👔</text></svg>">
    <title>API Key Created - Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #16213e;
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .icon {
            width: 64px;
            height: 64px;
            background: #166534;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .icon svg {
            width: 32px;
            height: 32px;
            color: #dcfce7;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .warning {
            background: #78350f;
            color: #fef3c7;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .api-key-box {
            background: #0f172a;
            border: 2px solid #4a6cf7;
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .api-key {
            font-family: monospace;
            font-size: 1.25rem;
            word-break: break-all;
            color: #4ade80;
            user-select: all;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4a6cf7 0%, #6366f1 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #333;
            color: #fff;
            margin-left: 1rem;
        }
        .btn-secondary:hover { background: #444; }
        .copy-btn {
            background: #333;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
        .copy-btn:hover { background: #444; }
        .actions {
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h1>API Key Created</h1>
        <p class="subtitle">The new API key has been generated successfully.</p>

        <div class="warning">
            <strong>Important:</strong> This key will only be shown once. Copy it now and store it securely.
        </div>

        <div class="api-key-box">
            <div class="api-key" id="apiKey">{{ api_key }}</div>
            <button class="copy-btn" onclick="copyKey()">Copy to Clipboard</button>
        </div>

        <div class="actions">
            <a href="/admin/users/{{ user_id }}" class="btn btn-primary">Back to User</a>
        </div>
    </div>

    <script>
        function copyKey() {
            const key = document.getElementById('apiKey').textContent;
            navigator.clipboard.writeText(key).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = 'Copy to Clipboard';
                }, 2000);
            });
        }
    </script>
</body>
</html>
