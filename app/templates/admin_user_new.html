<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👔</text></svg>">
    <title>Create User - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e5e5e5;
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #333;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        header p {
            color: #888;
            font-size: 0.875rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section {
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e5e5e5;
            font-size: 0.875rem;
            font-weight: 500;
        }

        input[type="email"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e5e5e5;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        input::placeholder {
            color: #666;
        }

        .hint {
            color: #666;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #333;
            color: #e5e5e5;
        }

        .btn-secondary:hover {
            background: #404040;
        }

        .error {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .form-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .cancel-link {
            text-align: center;
            color: #888;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .cancel-link:hover {
            color: #60a5fa;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .section {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Create New User</h1>
                <p>Add a new user to the system</p>
            </div>
            <div class="header-actions">
                <a href="/admin/users" class="btn btn-secondary">Back to Users</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="section">
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/admin/users/new">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="user@example.com" required autofocus>
                </div>
                <div class="form-group">
                    <label for="display_name">Display Name (optional)</label>
                    <input type="text" id="display_name" name="display_name" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="passcode">Passcode</label>
                    <input type="password" id="passcode" name="passcode" placeholder="Minimum 8 characters" required minlength="8">
                    <p class="hint">User will use this passcode to log in with their email.</p>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create User</button>
                    <a href="/admin/users" class="cancel-link">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
